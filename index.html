
<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Niveaux clés – ES / NQ / GC</title>

<style>
:root{
  --bg:#0b1220; --card:#101a2e; --txt:#e8eefc;
  --muted:#9fb0d0; --line:#20304f;
  --accent:#5eead4;
  --green:#22c55e;
  --red:#ef4444;
  --orange:#f59e0b;
}
body{
  margin:0; font-family:system-ui,Segoe UI,Roboto,Arial;
  background:#070b14; color:var(--txt);
}
header{padding:16px;border-bottom:1px solid var(--line)}
.wrap{max-width:1200px;margin:auto;padding:16px}
.card{
  background:var(--card); border:1px solid var(--line);
  border-radius:14px; padding:14px; margin-bottom:14px;
}
.grid{display:grid;grid-template-columns:380px 1fr;gap:14px}
@media(max-width:900px){.grid{grid-template-columns:1fr}}

label{font-size:12px;color:var(--muted);display:block;margin-top:8px}
input,select,textarea{
  width:100%;padding:8px;border-radius:8px;
  border:1px solid var(--line);
  background:#0b1324;color:var(--txt)
}
textarea{min-height:70px}
button{
  border:0;border-radius:10px;padding:8px 12px;
  font-weight:600;cursor:pointer
}
.primary{background:var(--accent);color:#042018}
.secondary{background:#1c2b48;color:var(--txt)}

.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.tab{
  padding:6px 14px;border-radius:999px;
  border:1px solid var(--line);
  background:#0b1324;color:var(--muted);
  cursor:pointer
}
.tab.active{
  background:var(--accent);
  color:#042018;
  font-weight:700
}

table{width:100%;border-collapse:collapse}
th,td{border-bottom:1px solid var(--line);padding:8px;font-size:13px}
th{color:var(--muted);text-align:left}

.tag{
  border:1px solid var(--line);
  border-radius:999px;
  padding:2px 8px;
  font-size:11px;
  margin-right:4px
}

/* ★ étoiles jaunes */
.stars{
  color:#facc15;
  letter-spacing:1px;
}

/* Icônes biais */
.bias{
  font-weight:700;
  display:inline-flex;
  align-items:center;
  gap:4px;
}
.bias.long{color:var(--green)}
.bias.short{color:var(--red)}
.bias.neutral{color:var(--orange)}
</style>
</head>

<body>
<header>
  <h2 style="margin:0">Niveaux clés – ES / NQ / GC</h2>
</header>

<div class="wrap">
  <div class="tabs" id="tabs"></div>

  <div class="grid">
    <!-- FORMULAIRE -->
    <div class="card">
      <label>Date</label>
      <input type="date" id="date">

      <label>Prix / Niveau</label>
      <input type="number" step="0.01" id="price">

      <label>Force (1 à 5)</label>
      <select id="strength">
        <option>1</option><option>2</option>
        <option selected>3</option>
        <option>4</option><option>5</option>
      </select>

      <label>Type</label>
      <select id="type">
        <option>Gamma Flip</option>
        <option>Call Wall</option>
        <option>Put Wall</option>
        <option>VAL</option>
        <option>VAH</option>
        <option>POC</option>
        <option>Support</option>
        <option>Résistance</option>
      </select>

      <label>Biais</label>
      <select id="bias">
        <option>Neutre</option>
        <option>Plutôt Long</option>
        <option>Plutôt Short</option>
      </select>

      <label>Plan / Commentaire</label>
      <textarea id="note"></textarea>

      <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
        <button class="primary" onclick="saveLevel()">Ajouter / Mettre à jour</button>
        <button class="secondary" onclick="resetForm()">Reset</button>
      </div>
    </div>

    <!-- TABLEAU -->
    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Prix</th>
            <th>Force</th>
            <th>Détails</th>
            <th>Plan</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const MARKETS = ["ES","NQ","GC"];
let currentMarket = MARKETS[0];
let editingId = null;

const $ = id => document.getElementById(id);
const today = () => new Date().toISOString().slice(0,10);
const key = m => "levels_"+m;
const stars = n => "★".repeat(n) + "☆".repeat(5-n);

function biasIcon(b){
  if(b.includes("Short"))
    return `<span class="bias short">↘</span>`;
  if(b.includes("Long"))
    return `<span class="bias long">↗</span>`;
  return `<span class="bias neutral">~</span>`;
}

function biasClass(b){
  if(b.includes("Short")) return "short";
  if(b.includes("Long")) return "long";
  return "neutral";
}

function load(){ return JSON.parse(localStorage.getItem(key(currentMarket))||"[]"); }
function save(d){ localStorage.setItem(key(currentMarket),JSON.stringify(d)); }

function renderTabs(){
  tabs.innerHTML="";
  MARKETS.forEach(m=>{
    const t=document.createElement("div");
    t.className="tab"+(m===currentMarket?" active":"");
    t.textContent=m;
    t.onclick=()=>{currentMarket=m;resetForm();renderTabs();render();}
    tabs.appendChild(t);
  });
}

function render(){
  const data=load();
  tbody.innerHTML="";
  data.forEach(l=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td>${l.date}</td>
      <td><b>${l.price}</b></td>
      <td class="stars">${stars(l.strength)}</td>
      <td>
        <span class="tag">${l.type}</span>
        <span class="bias ${biasClass(l.bias)}">
          ${biasIcon(l.bias)} ${l.bias}
        </span>
      </td>
      <td>${l.note||""}</td>
    `;
    tbody.appendChild(tr);
  });
}

function saveLevel(){
  const d=load();
  const o={
    id:editingId||crypto.randomUUID().slice(0,8),
    date:date.value||today(),
    price:+price.value,
    strength:+strength.value,
    type:type.value,
    bias:bias.value,
    note:note.value
  };
  const i=d.findIndex(x=>x.id===o.id);
  if(i>=0)d[i]=o; else d.push(o);
  save(d); resetForm(); render();
}

function resetForm(){
  editingId=null;
  date.value=today();
  price.value="";
  strength.value=3;
  type.value="Gamma Flip";
  bias.value="Neutre";
  note.value="";
}

resetForm();
renderTabs();
render();
</script>
</body>
</html>
